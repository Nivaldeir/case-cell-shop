services:
  localstack:
    image: localstack/localstack:3.8
    container_name: localstack
    restart: unless-stopped
    environment:
      SERVICES: ${LOCALSTACK_SERVICES:-s3,sqs}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      PERSISTENCE: ${LOCALSTACK_PERSISTENCE:-1}
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh
    healthcheck:
      test: ["CMD", "bash", "-c", "awslocal sqs list-queues >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  localstack_data:
  redis_data:
